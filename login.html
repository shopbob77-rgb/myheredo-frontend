<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Logowanie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-950 to-black">
    <div class="max-w-md w-full bg-slate-900 rounded-3xl p-10 border border-slate-800">
        
        <div class="text-center mb-10">
            <img src="logo.png" alt="MyHeredo" class="h-16 mx-auto mb-4">
            <h1 class="text-3xl font-bold text-amber-400">MyHeredo</h1>
            <p class="text-slate-400 mt-2">Zaloguj się do swojego sejfu sukcesyjnego</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm text-slate-400 mb-2">Adres email</label>
                <input type="email" id="email" 
                       class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-amber-400"
                       placeholder="jan.kowalski@email.pl">
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-2">Hasło główne (Master Password)</label>
                <input type="password" id="masterPassword" 
                       class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-amber-400"
                       placeholder="Twoje główne hasło">
            </div>

            <button onclick="loginUser()" 
                    class="w-full bg-gradient-to-r from-amber-400 to-yellow-500 text-slate-950 font-semibold py-5 rounded-3xl text-lg hover:brightness-110 transition">
                Zaloguj się
            </button>
        </div>

        <div class="text-center mt-8">
            <a href="register.html" class="text-amber-400 hover:text-amber-300 text-sm">
                Nie masz jeszcze konta? Zarejestruj się
            </a>
        </div>
    </div>

    <script>
        function loginUser() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('masterPassword').value.trim();

            if (!email || !password) {
                alert("❌ Wypełnij wszystkie pola");
                return;
            }

            // Zapis danych logowania
            localStorage.setItem('myheredo_user_email', email);
            sessionStorage.setItem('myheredo_master_password', password);

            alert("✅ Logowanie pomyślne!");
            window.location.href = "dashboard.html";
        }

        // Enter na polu hasła też loguje
        document.getElementById('masterPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginUser();
            }
        });
    </script>
</body>
</html>
