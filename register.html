<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Rejestracja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; }
        .modal { animation: fadeInScale 0.3s ease; }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        
        <!-- Krok 1: Dane logowania -->
        <div id="step1" class="bg-slate-900 rounded-3xl p-10">
            <div class="flex justify-center mb-8">
                <img src="logo.png" alt="MyHeredo" class="h-16">
            </div>
            <h1 class="text-3xl font-bold text-center mb-8">Utwórz konto</h1>
            
            <div class="space-y-6">
                <input id="email" type="email" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-400" placeholder="Adres e-mail">
                <input id="password" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-400" placeholder="Hasło">
                <input id="passwordConfirm" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-400" placeholder="Powtórz hasło">
            </div>

            <button onclick="goToStep2()" class="w-full mt-8 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-4 rounded-2xl text-lg">
                Dalej
            </button>
        </div>

        <!-- Krok 2: 2FA Modal -->
        <div id="step2" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
            <div class="bg-slate-900 rounded-3xl p-8 max-w-md w-full mx-4 modal">
                <h2 class="text-2xl font-semibold text-center mb-6">Konfiguracja 2FA</h2>
                <p class="text-center text-slate-400 mb-6">Zeskanuj kod QR w aplikacji autentykatora</p>
                
                <div class="flex justify-center mb-8">
                    <div id="qrcode" class="bg-white p-4 rounded-2xl"></div>
                </div>
                
                <!-- Backup Code - bardziej widoczny -->
                <div class="bg-slate-800 rounded-2xl p-5 mb-8">
                    <p class="text-xs text-slate-400 mb-3">Kod backup (do ręcznego wpisania):</p>
                    <div class="flex items-center gap-3 bg-slate-900 rounded-xl p-4">
                        <code id="backupCode" class="font-mono text-amber-400 text-lg flex-1">X7K9-P2M4-Q8V6-L3N9</code>
                        <button onclick="copyBackupCode()" 
                                class="bg-slate-700 hover:bg-slate-600 px-5 py-3 rounded-xl text-sm font-medium flex items-center gap-2">
                            <i class="fas fa-copy"></i> Kopiuj
                        </button>
                    </div>
                </div>

                <button onclick="completeRegistration()" 
                        class="w-full bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-4 rounded-2xl text-lg">
                    Zakończ rejestrację
                </button>
                
                <p class="text-center text-xs text-slate-500 mt-6">
                    Zachowaj ten kod backup w bezpiecznym miejscu.<br>
                    Będzie potrzebny, jeśli stracisz dostęp do telefonu.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        function goToStep2() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const passConfirm = document.getElementById('passwordConfirm').value;

            if (!email || !pass || !passConfirm) return alert("Wypełnij wszystkie pola");
            if (pass !== passConfirm) return alert("Hasła nie są identyczne");
            if (pass.length < 8) return alert("Hasło musi mieć co najmniej 8 znaków");

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            generateQRCode(email);
        }

        function generateQRCode(email) {
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            
            new QRCode(qrcodeDiv, {
                text: `otpauth://totp/MyHeredo:${email}?secret=JVK5K2L2M3N4P5Q6R7S8T9U0V&issuer=MyHeredo`,
                width: 260,
                height: 260,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });
        }

        function copyBackupCode() {
            const code = document.getElementById('backupCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = '✓ Skopiowano!';
                setTimeout(() => btn.innerHTML = originalText, 2000);
            });
        }

        function completeRegistration() {
            alert("✅ Rejestracja zakończona pomyślnie!\n\nMożesz teraz się zalogować.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
