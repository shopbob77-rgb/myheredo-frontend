<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Rejestracja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>    
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #e2e8f0; 
        }
        
        #qrcode-container {
            background-color: white;
            padding: 24px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 280px;
            margin: 0 auto;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }

        @media (max-width: 640px) {
            #qrcode-container {
                padding: 18px;
                max-width: 240px;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-8 px-4">
    <div class="max-w-md w-full mx-auto">

        <!-- Krok 1: Dane logowania -->
        <div id="step1" class="bg-slate-900 rounded-3xl p-8 sm:p-10">
            <div class="flex justify-center mb-8">
                <img src="logo.png" alt="MyHeredo" class="h-14">
            </div>
            <h1 class="text-3xl font-bold text-center mb-8">Utwórz konto</h1>
           
            <div class="space-y-6">
                <input id="email" type="email" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-400" placeholder="Adres e-mail">
                <input id="password" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-400" placeholder="Hasło">
                <input id="passwordConfirm" type="password" class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-amber-400" placeholder="Powtórz hasło">
            </div>
            <button onclick="goToStep2()" class="w-full mt-8 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-4 rounded-2xl text-lg">
                Dalej
            </button>
        </div>

        <!-- Krok 2: 2FA -->
        <div id="step2" class="hidden bg-slate-900 rounded-3xl p-6 sm:p-10 max-w-md w-full mx-auto">
            <div class="flex justify-center mb-6">
                <img src="logo.png" alt="MyHeredo" class="h-14">
            </div>
            
            <h1 class="text-2xl font-bold text-center mb-2">Włącz 2FA</h1>
            <p class="text-center text-slate-400 mb-8">Zeskanuj kod QR w aplikacji autentykatorowej</p>

            <!-- QR Code - mocno wycentrowany -->
            <div id="qrcode-container" class="mx-auto mb-8">
                <div id="qrcode"></div>
            </div>

            <!-- Backup Code -->
            <div class="mb-8">
                <p class="text-xs text-slate-400 mb-3 text-center">Lub użyj kodu backup:</p>
                <div id="backupCode" 
                     class="font-mono bg-slate-800 p-5 rounded-2xl text-center text-amber-400 text-base break-all cursor-pointer hover:bg-slate-700"
                     onclick="copyBackupCode()">
                    X7K9-P2M4-Q8V6-L3N9
                </div>
            </div>

            <!-- Wpisz kod -->
            <div class="space-y-4">
                <p class="text-sm text-slate-400 text-center">Wpisz kod z aplikacji autentykatora</p>
                <input id="verificationCode" type="text" maxlength="6" 
                       class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-6 py-5 text-center text-2xl tracking-widest focus:outline-none focus:border-amber-400"
                       placeholder="123456">
                <button onclick="verifyCode()" class="w-full mt-4 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-4 rounded-2xl">
                    Zweryfikuj kod
                </button>
            </div>
        </div>
    </div>

    <script>
        function goToStep2() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            const passConfirm = document.getElementById('passwordConfirm').value;

            if (!email || !pass || !passConfirm) return alert("Wypełnij wszystkie pola");
            if (pass !== passConfirm) return alert("Hasła nie są identyczne");
            if (pass.length < 8) return alert("Hasło musi mieć co najmniej 8 znaków");

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            generateQRCode(email);
        }

        function generateQRCode(email) {
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, {
                text: `otpauth://totp/MyHeredo:${email}?secret=JVK5K2L2M3N4P5Q6R7S8T9U0V&issuer=MyHeredo`,
                width: 240,
                height: 240,
                colorDark: "#000000",
                colorLight: "#ffffff"
            });
        }

        function copyBackupCode() {
            const code = document.getElementById('backupCode').textContent;
            navigator.clipboard.writeText(code).then(() => alert("Kod backup skopiowany!"));
        }

        function verifyCode() {
            const code = document.getElementById('verificationCode').value.trim();
            if (code.length !== 6) return alert("Kod musi składać się z 6 cyfr");
            if (code === "123456") {
                alert("✅ Rejestracja zakończona pomyślnie!");
                window.location.href = "login.html";
            } else {
                alert("Niepoprawny kod. W demo użyj: 123456");
            }
        }
    <script type="module">
    import { registerUser } from "./auth.js";

    const form = document.getElementById("registerForm"); // ← zmień na ID swojego formularza

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;     // ← zmień ID jeśli inne
        const password = document.getElementById("password").value; // ← zmień ID jeśli inne

        try {
            await registerUser(email, password);
            alert("Rejestracja udana! Sprawdź swoją skrzynkę email.");
            // window.location.href = "login.html"; // opcjonalnie przekierowanie
        } catch (error) {
            alert("Błąd rejestracji: " + error.message);
        }
    });
</script>
</body>
</html>
