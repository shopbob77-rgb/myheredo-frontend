<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Rejestracja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-950 to-black">
    <div class="max-w-md w-full bg-slate-900 rounded-3xl p-10 border border-slate-800">
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <span class="text-5xl">👑</span>
            </div>
            <h1 class="text-3xl font-bold text-amber-400">MyHeredo</h1>
            <p class="text-slate-400 mt-2">Tworzenie konta — Krok 2 z 2</p>
        </div>

        <div class="bg-slate-800 rounded-2xl p-8">
            <p class="text-center text-slate-400 mb-6">Zabezpiecz konto dwuskładnikowym uwierzytelnianiem (2FA)</p>
            
            <!-- QR Code -->
            <div class="bg-slate-900 rounded-2xl p-6 text-center mb-8">
                <p class="text-sm text-slate-400 mb-4">Zeskanuj kod QR w aplikacji Authenticator</p>
                <div id="qrcode" class="mx-auto bg-white p-4 inline-block rounded-xl"></div>
            </div>

            <!-- Backup Code -->
            <div class="mb-8">
                <p class="text-sm text-slate-400 mb-3">Kod backup (do ręcznego wpisania):</p>
                <div id="backupCode" class="bg-slate-950 border border-slate-700 rounded-2xl p-6 font-mono text-xl tracking-widest text-center">
                    GENEROWANIE...
                </div>
                <button onclick="copyBackupCode()" 
                        class="mt-4 w-full bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-4 rounded-2xl flex items-center justify-center gap-2">
                    <i class="fas fa-copy"></i> Kopiuj kod backup
                </button>
            </div>

            <!-- Weryfikacja -->
            <div>
                <label class="block text-sm text-slate-400 mb-2">Wprowadź kod z aplikacji (6 cyfr)</label>
                <input type="text" id="verificationCode" maxlength="6" 
                       class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-5 text-center text-3xl tracking-widest focus:outline-none focus:border-amber-400"
                       placeholder="123456">
            </div>

            <button onclick="verifyCode()" 
                    class="mt-6 w-full bg-gradient-to-r from-amber-400 to-yellow-500 text-slate-950 font-semibold py-5 rounded-3xl text-lg">
                Zweryfikuj kod i utwórz konto
            </button>
        </div>
    </div>

    <!-- Biblioteka QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode.js@1.0.0/qrcode.min.js"></script>
    <script>
        let backupCode = "";

        function generate2FA() {
            backupCode = "J7K9-M4P2-Q8X5-R3T6-W9V1-L2B8";
            document.getElementById('backupCode').textContent = backupCode;

            // Generowanie QR Code
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            new QRCode(qrContainer, {
                text: "otpauth://totp/MyHeredo:user@myheredo.pl?secret=J7K9M4P2Q8X5R3T6W9V1L2B8&issuer=MyHeredo",
                width: 220,
                height: 220,
                colorDark: "#111827",
                colorLight: "#ffffff"
            });
        }

        function copyBackupCode() {
            const clean = backupCode.replace(/-/g, '');
            navigator.clipboard.writeText(clean).then(() => {
                alert("✅ Kod backup skopiowany do schowka!");
            });
        }

        function verifyCode() {
            const code = document.getElementById('verificationCode').value.trim();
            if (code === "123456") {
                alert("✅ Konto zostało pomyślnie utworzone!");
                setTimeout(() => window.location.href = "login.html", 1000);
            } else {
                alert("❌ Niepoprawny kod. W trybie demo użyj kodu: 123456");
            }
        }

        // Uruchomienie
        window.onload = generate2FA;
    </script>
</body>
</html>
