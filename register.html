<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    ...
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo - Rejestracja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(180deg, #0a0a0a 0%, #111827 100%);
            color: #e2e8f0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="max-w-lg w-full">

    <!-- Nagłówek -->
    <div class="text-center mb-10">
        <img src="logo.png" alt="MyHeredo" class="h-16 md:h-20 mx-auto mb-6">
        <h1 class="text-4xl font-bold text-amber-400">MyHeredo</h1>
        <p class="text-slate-400 mt-2">Zabezpiecz swój cyfrowy majątek</p>
    </div>

    <div class="bg-slate-900 rounded-3xl p-8 md:p-10 border border-slate-700">

        <!-- Etap 1: Dane rejestracji -->
        <div id="stage1">
            <h2 class="text-3xl font-semibold text-center mb-2">Utwórz swój Sejf</h2>
            <p class="text-slate-400 text-center mb-8">Zacznij chronić swoje dziedzictwo</p>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Adres e-mail</label>
                    <input type="email" id="regEmail" 
                           class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-5 focus:border-amber-400 outline-none text-base"
                           placeholder="twoj@email.pl">
                </div>

                <div>
                    <label class="block text-sm text-slate-400 mb-2">Główne hasło sejfu</label>
                    <input type="password" id="regPassword" 
                           class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-6 py-5 focus:border-amber-400 outline-none text-base"
                           placeholder="Minimum 8 znaków">
                </div>

                <button onclick="goTo2FA()" 
                        class="w-full bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-5 rounded-2xl text-lg transition-all">
                    Dalej → Generuj 2FA
                </button>
            </div>
        </div>

        <!-- Etap 2: 2FA -->
        <div id="stage2" class="hidden">
            <h2 class="text-3xl font-semibold text-center mb-2">Weryfikacja dwuetapowa</h2>
            <p class="text-slate-400 text-center mb-8">Zeskanuj kod QR w aplikacji Authenticator</p>

            <div class="flex justify-center mb-8 bg-white p-6 rounded-2xl">
                <img id="qrCode" src="" alt="QR Code" class="w-64 h-64">
            </div>

            <div class="text-center mb-6">
                <p class="text-xs text-slate-400 mb-1">Klucz ręczny:</p>
                <p id="manualKey" class="font-mono text-amber-400 break-all"></p>
            </div>

            <input type="text" id="verificationCode" maxlength="6" 
                   class="w-full text-center text-4xl tracking-[8px] bg-slate-950 border border-slate-700 rounded-2xl py-6 focus:border-amber-400 outline-none"
                   placeholder="000000">

            <button onclick="verify2FA()" 
                    class="w-full mt-8 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-5 rounded-2xl text-lg">
                Zweryfikuj i utwórz konto
            </button>
        </div>
    </div>

    <div class="text-center mt-8">
        <a href="login.html" class="text-slate-400 hover:text-slate-300 text-sm">
            Masz już konto? <span class="text-amber-400">Zaloguj się</span>
        </a>
    </div>
</div>

<script>
    let generatedSecret = "";

    function goTo2FA() {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();

        if (!email || !password || password.length < 8) {
            alert("Podaj poprawny email i hasło (minimum 8 znaków)");
            return;
        }

        localStorage.setItem('myheredo_user_email', email);
        localStorage.setItem('myheredo_master_password', password);

        generatedSecret = "MH" + Math.random().toString(36).substring(2, 15).toUpperCase();

        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=otpauth://totp/MyHeredo:${encodeURIComponent(email)}?secret=${generatedSecret}&issuer=MyHeredo`;

        document.getElementById('qrCode').src = qrUrl;
        document.getElementById('manualKey').textContent = generatedSecret;

        document.getElementById('stage1').classList.add('hidden');
        document.getElementById('stage2').classList.remove('hidden');
    }

    function verify2FA() {
        const code = document.getElementById('verificationCode').value.trim();

        if (code.length !== 6 || isNaN(code)) {
            alert("Wprowadź 6-cyfrowy kod z aplikacji Authenticator");
            return;
        }

        localStorage.setItem('myheredo_2fa_enabled', 'true');
        localStorage.setItem('myheredo_2fa_secret', generatedSecret);

        alert("✅ Konto zostało pomyślnie utworzone!");
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>
