<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    ...
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(180deg, #0a0a0a 0%, #111827 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        .dashboard-container {
            min-height: 100vh;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<div class="dashboard-container">

    <!-- Nagłówek -->
    <div class="flex justify-between items-center pb-6 border-b border-slate-800">
        <div class="flex items-center gap-4">
            <img src="logo.png" alt="MyHeredo" class="h-10 w-auto">
            <h1 class="text-3xl font-bold text-amber-400">MyHeredo</h1>
        </div>
        <div class="flex items-center gap-6">
            <div id="userEmail" class="text-sm text-slate-400"></div>
            <button onclick="handleLogout()" class="px-6 py-3 border border-slate-600 hover:border-red-500 rounded-2xl">Wyloguj się</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 pt-8">

        <!-- Lewa kolumna - Skrytki -->
        <div class="lg:col-span-7">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold">Twoje Skrytki Sukcesyjne</h2>
                <div class="flex gap-3">
                    <button onclick="loadDemoData()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 px-5 py-3 rounded-2xl text-sm">
                        📊 Przykładowe dane
                    </button>
                    <button onclick="addCustomVault()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-5 py-3 rounded-2xl text-sm">
                        + Nowa Skrytka
                    </button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5" id="skrytkiGrid"></div>
        </div>

        <!-- Prawa kolumna - Spadkobiercy -->
        <div class="lg:col-span-5">
            <h2 class="text-2xl font-bold mb-5">Zaufani Spadkobiercy</h2>
            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700 min-h-[300px]" id="heirsList"></div>
            
            <div class="mt-6 bg-slate-900 rounded-3xl p-6 border border-slate-700">
                <div class="grid grid-cols-2 gap-4">
                    <input id="heirName" type="text" class="bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4" placeholder="Imię / relacja">
                    <input id="heirEmail" type="email" class="bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4" placeholder="email@przyklad.pl">
                </div>
                <button onclick="addHeir()" class="w-full mt-6 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-4 rounded-2xl">
                    + Dodaj Spadkobiercę
                </button>
            </div>
        </div>
    </div>

    <!-- Przyciski dolne -->
    <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
            <h3 class="font-semibold mb-4">Dead Man’s Switch</h3>
            <input type="range" id="dmsSlider" min="14" max="90" value="45" class="w-full accent-amber-400">
            <div class="flex justify-between text-sm text-slate-400 mt-3">
                <span>14 dni</span>
                <span id="dmsValue" class="font-semibold text-amber-400">45 dni</span>
                <span>90 dni</span>
            </div>
        </div>

        <button onclick="showCertificate()" class="bg-gradient-to-r from-amber-400 to-yellow-500 text-slate-950 font-semibold py-8 rounded-3xl text-lg hover:brightness-110">
            🪶 Generuj Certyfikat Sukcesji
        </button>

        <button onclick="simulateDeath()" class="bg-red-600 hover:bg-red-700 text-white font-semibold py-8 rounded-3xl text-lg">
            ⚰️ Symulacja Po Śmierci
        </button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
