<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Dashboard</title>
    
    <!-- PWA - Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fbbf24">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: #e2e8f0;
        }
        .dashboard-container {
            min-height: 100vh;
            max-width: 1480px;
            margin: 0 auto;
            padding: 24px;
        }
        .skrytka-card {
            transition: all 0.3s ease;
        }
        .skrytka-card:hover {
            transform: translateY(-4px);
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- Nagłówek -->
    <div class="flex justify-between items-center pb-6 border-b border-slate-800">
        <div class="flex items-center gap-4">
            <img src="logo.png" alt="MyHeredo" class="h-10 w-auto">
            <h1 class="text-3xl font-bold text-amber-400">MyHeredo</h1>
        </div>
        <div class="flex items-center gap-6">
            <div id="userEmail" class="text-sm text-slate-400"></div>
            <button onclick="handleLogout()" class="px-6 py-2 border border-slate-700 hover:border-red-500 rounded-2xl">Wyloguj się</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mt-8">
        <!-- Lewa kolumna - Skrytki -->
        <div class="lg:col-span-7">
            <h2 class="text-2xl font-bold mb-5">Twoje Skrytki Sukcesyjne</h2>
            <div id="skrytkiGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Skrytki generowane przez JS -->
            </div>
            <div class="mt-8">
                <button onclick="addCustomVault()" class="w-full py-4 border border-dashed border-slate-600 hover:border-amber-400 rounded-3xl text-slate-400 hover:text-amber-400">
                    + Dodaj własną skrytkę
                </button>
            </div>
        </div>
        <!-- Prawa kolumna - Spadkobiercy -->
        <div class="lg:col-span-5">
            <h2 class="text-2xl font-bold mb-5">Zaufani Spadkobiercy</h2>
            <div id="heirsList" class="bg-slate-900 rounded-3xl p-6 border border-slate-700 min-h-[300px]">
                <!-- Generowane przez JS -->
            </div>
            <div class="mt-6 bg-slate-900 rounded-3xl p-6 border border-slate-700">
                <div class="grid grid-cols-2 gap-3">
                    <input id="heirName" type="text" class="bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3" placeholder="Imię / relacja">
                    <input id="heirEmail" type="email" class="bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3" placeholder="email@przyklad.pl">
                </div>
                <button onclick="addHeir()" class="w-full mt-4 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-3.5 rounded-2xl">
                    + Dodaj Spadkobiercę
                </button>
            </div>
        </div>
    </div>

    <!-- Dead Man’s Switch + Przyciski główne -->
    <div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
            <h3 class="font-semibold mb-4">Dead Man’s Switch</h3>
            <input type="range" id="dmsSlider" min="14" max="90" value="45" class="w-full accent-amber-400">
            <div class="flex justify-between text-sm mt-3 text-slate-400">
                <span>14 dni</span>
                <span id="dmsValue" class="font-semibold text-amber-400">45 dni</span>
                <span>90 dni</span>
            </div>
        </div>
        <button onclick="showCertificate()" class="bg-gradient-to-r from-amber-400 to-yellow-500 text-slate-950 font-semibold rounded-3xl hover:brightness-110 transition-all">
            🪶 Generuj Certyfikat Sukcesji
        </button>
        <button onclick="simulateDeath()" class="bg-red-600 hover:bg-red-700 text-white font-semibold rounded-3xl transition-all">
            ⚰️ Symulacja Po Śmierci
        </button>
    </div>

    <!-- Przycisk Demo -->
    <div class="mt-6">
        <button onclick="loadDemoData()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-3xl text-slate-300 hover:text-white transition-all">
            📋 Wczytaj przykładowe dane demonstracyjne
        </button>
    </div>

    <!-- Moje Certyfikaty -->
    <div class="mt-16 pt-10 border-t border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold flex items-center gap-3">
                📜 Moje Certyfikaty
            </h2>
            <button onclick="loadCertificates()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl text-sm flex items-center gap-2">
                <i class="fas fa-sync"></i> Odśwież
            </button>
        </div>
        <div id="certificatesList" class="space-y-4">
            <!-- Lista certyfikatów -->
        </div>
    </div>
</div>

<script src="app.js"></script>

<!-- PWA - Service Worker -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ Service Worker zarejestrowany'))
            .catch(err => console.log('❌ Błąd SW:', err));
    });
}
</script>
</body>
</html>
