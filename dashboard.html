<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Dashboard</title>
  <link rel="icon" href="/ico-512.png" sizes="512x512" type="image/png">
<link rel="icon" href="/ico-192.png" sizes="192x192" type="image/png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fbbf24">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; }
        .dashboard-container { min-height: 100vh; max-width: 1480px; margin: 0 auto; padding: 24px; }
        #userEmail { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; }
        #skrytkiGrid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
        @media (max-width: 640px) {
            .dashboard-container { padding: 16px; }
            #userEmail { max-width: 110px; font-size: 0.75rem; }
            #skrytkiGrid { grid-template-columns: 1fr; gap: 12px; }
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- Nagłówek -->
    <div class="flex justify-between items-center pb-6 border-b border-slate-800 px-2 sm:px-0">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="MyHeredo" class="h-9 w-auto flex-shrink-0">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-amber-400">MyHeredo</h1>
                <p class="text-xs sm:text-sm text-slate-400 -mt-1">Cyfrowy Sejf Sukcesyjny</p>
            </div>
        </div>
        <div class="flex items-center gap-3 sm:gap-6">
            <div id="userEmail" class="text-xs sm:text-sm text-slate-400 text-right"></div>
            <button onclick="handleLogout()" class="px-4 sm:px-6 py-2 text-sm border border-slate-700 hover:border-red-500 hover:text-red-400 rounded-2xl whitespace-nowrap">
                Wyloguj się
            </button>
        </div>
    </div>

    <!-- Główna zawartość -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mt-8">
        <!-- Skrytki -->
        <div class="lg:col-span-7">
            <h2 class="text-2xl font-bold mb-5">Twoje Skrytki Sukcesyjne</h2>
            <div id="skrytkiGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            <div class="mt-8">
                <button onclick="addCustomVault()" class="w-full py-4 border border-dashed border-slate-600 hover:border-amber-400 rounded-3xl text-slate-400 hover:text-amber-400">
                    + Dodaj własną skrytkę
                </button>
            </div>
        </div>

        <!-- Spadkobiercy -->
        <div class="lg:col-span-5">
            <h2 class="text-2xl font-bold mb-5">Zaufani Spadkobiercy</h2>
            <div id="heirsList" class="bg-slate-900 rounded-3xl p-6 border border-slate-700 min-h-[300px]"></div>
            <div class="mt-6 bg-slate-900 rounded-3xl p-6 border border-slate-700">
                <div class="grid grid-cols-2 gap-3">
                    <input id="heirName" type="text" class="bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3" placeholder="Imię / relacja">
                    <input id="heirEmail" type="email" class="bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3" placeholder="email@przyklad.pl">
                </div>
                <button onclick="addHeir()" class="w-full mt-4 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-3.5 rounded-2xl">
                    + Dodaj Spadkobiercę
                </button>
            </div>
        </div>
    </div>

    <!-- Dead Man’s Switch + Przyciski -->
    <div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
            <h3 class="font-semibold mb-4">Dead Man’s Switch</h3>
            <input type="range" id="dmsSlider" min="14" max="90" value="45" class="w-full accent-amber-400">
            <div class="flex justify-between text-sm mt-3 text-slate-400">
                <span>14 dni</span>
                <span id="dmsValue" class="font-semibold text-amber-400">45 dni</span>
                <span>90 dni</span>
            </div>
        </div>
        <button onclick="showCertificate()" class="bg-gradient-to-r from-amber-400 to-yellow-500 text-slate-950 font-semibold rounded-3xl hover:brightness-110 transition-all">
            🪶 Generuj Certyfikat Sukcesji
        </button>
        <button onclick="simulateDeath()" class="bg-red-600 hover:bg-red-700 text-white font-semibold rounded-3xl transition-all">
            ⚰️ Symulacja Po Śmierci
        </button>
    </div>

    <!-- Demo -->
    <div class="mt-6">
        <button onclick="loadDemoData()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-3xl text-slate-300 hover:text-white transition-all">
            📋 Wczytaj przykładowe dane demonstracyjne
        </button>
    </div>

    <!-- Recovery Password -->
    <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700 mt-10">
        <div class="flex items-center gap-3 mb-4">
            <div class="text-2xl">🔐</div>
            <div>
                <h3 class="text-xl font-semibold">Recovery Password</h3>
                <p class="text-sm text-slate-400">Hasło dla spadkobierców</p>
            </div>
        </div>
        <div id="recoveryStatus" class="mb-4 text-sm"></div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1.5">Recovery Password</label>
                <div class="relative">
                    <input id="recoveryPassword" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-4 py-3 pr-12 text-white">
                    <button type="button" onclick="toggleRecoveryPasswordVisibility()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white">
                        <i class="fas fa-eye" id="recoveryEyeIcon"></i>
                    </button>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="saveRecoveryPassword()" class="flex-1 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold py-3.5 rounded-2xl transition">Zapisz Recovery Password</button>
                <button onclick="changeRecoveryPassword()" class="flex-1 border border-slate-600 hover:bg-slate-800 font-semibold py-3.5 rounded-2xl transition">Zmień hasło</button>
            </div>
        </div>
    </div>

    <!-- Certyfikaty -->
    <div class="mt-16 pt-10 border-t border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold flex items-center gap-3">📜 Moje Certyfikaty</h2>
            <button onclick="loadCertificates()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl text-sm flex items-center gap-2">
                <i class="fas fa-sync"></i> Odśwież
            </button>
        </div>
        <div id="certificatesList" class="space-y-4"></div>
    </div>
</div>

<!-- Modale -->
<div id="changeRecoveryModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <!-- ... zawartość modalu zmiany Recovery Password ... -->
</div>

<div id="decryptModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
    <!-- ... zawartość modalu odszyfrowania ... -->
</div>

<!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ Service Worker zarejestrowany'))
            .catch(err => console.log('❌ Błąd SW:', err));
    });
}
</script>

<script type="module">
    import { auth, db } from './firebase.js';
    import { getUserVaults } from './auth.js';
    import { doc, updateDoc, addDoc, deleteDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    let currentVaults = [];
    let currentVault = null;

    // ===================== SZYFROWANIE =====================
    async function encryptData(text, password) { /* ... */ }
    async function decryptData(encryptedBase64, password) { /* ... */ }

    // ===================== SKRYTKI =====================
async function loadUserVaults() {
    try {
        const email = localStorage.getItem('myheredo_user_email');
        if (!email) {
            console.log("Brak emaila w localStorage");
            return;
        }

        console.log("Ładowanie skrytek dla:", email);
        
        const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");
        
        const querySnapshot = await getDocs(collection(db, "vaults"));
        const vaults = [];
        
        querySnapshot.forEach((doc) => {
            vaults.push({
                id: doc.id,
                ...doc.data()
            });
        });

        console.log("Pobrano skrytek:", vaults.length);
        
        // Używamy window.renderSkrytki
        if (window.renderSkrytki) {
            window.renderSkrytki(vaults);
        } else {
            console.error("renderSkrytki nie jest dostępne");
        }

    } catch (error) {
        console.error("Błąd ładowania skrytek:", error);
    }
}

    // ===================== MODAL ODSZYFROWANIA =====================
    function openDecryptModal(vault) { /* ... */ }
    function closeDecryptModal() { /* ... */ }
    async function decryptAndShowVault() { /* ... */ }
    async function saveVault(vaultId) { /* ... */ }
    async function addCustomVault() { /* ... */ }

    // ===================== SPADKOBIERCY (przeniesione z app.js) =====================
    let heirs = [];
    function renderHeirs() { /* ... */ }
    function addHeir() { /* ... */ }
    function removeHeir(i) { /* ... */ }

    // ===================== DMS =====================
    let dmsConfig = { days: 45, lastActivity: Date.now(), isActive: false };
    function setupDMS() { /* ... */ }

    // ===================== WYLOGOWANIE =====================
    function handleLogout() {
        if (confirm("Wylogować się z MyHeredo?")) {
            sessionStorage.clear();
            localStorage.removeItem('myheredo_user_email');
            window.location.href = "index.html";
        }
    }

    // ===================== INICJALIZACJA =====================
 import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

// Sprawdź localStorage jako fallback
const savedEmail = localStorage.getItem('myheredo_user_email');

onAuthStateChanged(auth, (user) => {
    if (user) {
        console.log("✅ Zalogowany według Firebase:", user.email);
        loadUserVaults();
    } else {
        console.log("⚠️ Firebase nie widzi zalogowanego użytkownika");
        
        if (savedEmail) {
            console.log("ℹ️ Mamy email w localStorage — ładujemy skrytki mimo braku Firebase Auth");
            // Tymczasowo ładujemy skrytki (Firebase Security Rules mogą blokować)
            loadUserVaults();
        } else {
            console.log("❌ Brak emaila — przekierowanie do logowania");
            window.location.href = "login.html";
        }
    }
});
    // ===================== REJESTRACJA GLOBALNA =====================
    window.handleLogout = handleLogout;
    window.addHeir = addHeir;
    window.removeHeir = removeHeir;
    window.addCustomVault = addCustomVault;
    window.saveVault = saveVault;
    window.renderSkrytki = renderSkrytki;
</script>

</body>
</html>
