<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHeredo • Cyfrowa Sukcesja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e2e8f0; scroll-behavior: smooth; }
        .hero-logo { transition: all 0.4s ease; }
        .nav-tab {
            transition: all 0.3s ease;
        }
        section { scroll-margin-top: 80px; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="border-b border-slate-800 bg-black/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="MyHeredo" class="h-9 sm:h-10">
                <span class="text-2xl font-bold text-amber-400">MyHeredo</span>
            </div>
           
            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-10 text-lg">
                <a href="#jak-dziala" class="nav-tab hover:text-amber-400">Jak działa</a>
                <a href="#bezpieczenstwo" class="nav-tab hover:text-amber-400">Bezpieczeństwo</a>
                <a href="#dla-agentow" class="nav-tab hover:text-amber-400">Dla Agentów</a>
            </div>
            
            <div class="hidden md:flex items-center gap-4">
                <a href="login.html" class="px-5 py-2.5 border border-slate-700 hover:border-amber-400 rounded-2xl font-medium text-sm sm:text-base">Zaloguj się</a>
                <a href="register.html" class="px-5 py-2.5 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold rounded-2xl text-sm sm:text-base">Załóż konto</a>
            </div>

            <!-- Hamburger -->
            <button id="hamburger" class="md:hidden text-3xl">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div id="mobileMenu" class="hidden md:hidden bg-black border-t border-slate-800">
            <div class="flex flex-col px-6 py-6 space-y-6 text-lg">
                <a href="#jak-dziala" class="nav-tab hover:text-amber-400">Jak działa</a>
                <a href="#bezpieczenstwo" class="nav-tab hover:text-amber-400">Bezpieczeństwo</a>
                <a href="#dla-agentow" class="nav-tab hover:text-amber-400">Dla Agentów</a>
                <div class="pt-6 border-t border-slate-700 flex flex-col gap-4">
                    <a href="login.html" class="px-6 py-3 border border-slate-700 hover:border-amber-400 rounded-2xl text-center">Zaloguj się</a>
                    <a href="register.html" class="px-6 py-3 bg-amber-400 hover:bg-amber-300 text-slate-950 font-semibold rounded-2xl text-center">Załóż konto</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Reszta kodu bez zmian (Hero, sekcje, stopka) -->
    <!-- ... (wklej resztę swojego kodu z poprzedniej wersji) ... -->

    <script>
        // Hamburger Menu
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        hamburger.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            const icon = hamburger.querySelector('i');
            icon.classList.toggle('fa-bars');
            icon.classList.toggle('fa-times');
        });

        // Zamknij menu po kliknięciu linku
        document.querySelectorAll('#mobileMenu a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                const icon = hamburger.querySelector('i');
                icon.classList.add('fa-bars');
                icon.classList.remove('fa-times');
            });
        });
    </script>
</body>
</html>
